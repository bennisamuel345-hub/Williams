<style>
*{
    margin:0;

body{

}

.sidebar{
    width:260px;
    height:100vh;

}


.profile{
    padding:0px;
    background:linear-gradient(135deg,#ffffff,#eef2f3);
    align-items:center;
    border-bottom:1px solid #eee;
}


.profile-info h3{
    font-size:15px;
    color:#222;
}

.profile-info p{
    font-size:8px;
    color:#777;
    margin-top:4px;
}

.menu{
    padding-bottom:px ;
}

.menu ul{
    list-style:none;
}

.menu li{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:14px 20px;
    color:#555;
    font-size:14px;
    cursor:pointer;
    transition:.3s;
}

.menu li:hover{
    background:#f5f5f5;
    color:#5b38f5;
}

.left{
    display:flex;
    align-items:center;
    gap: 15px;
}

.icon{

}

.arrow{
